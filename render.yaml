services:
  - type: web
    name: eavesdropper-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WHISPER_MODEL
        value: tiny
      - key: FRONTEND_ORIGINS
        sync: false
